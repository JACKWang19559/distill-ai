# Distill AI 知识蒸馏站 - Docker Compose 配置
# 一键启动：Web 应用 + Python 媒体处理服务 + PostgreSQL

version: "3.8"

services:
  # ============================================================================
  # PostgreSQL 数据库
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: distill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: distill
      POSTGRES_USER: distill
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-distill_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distill"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Python 媒体处理服务
  # ============================================================================
  media-processor:
    build:
      context: ./services/media-processor
      dockerfile: Dockerfile
    container_name: distill-media-processor
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./services/media-processor/.env
    volumes:
      - media_tmp:/app/tmp
      - media_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ============================================================================
  # Next.js Web 应用
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: distill-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://distill:${POSTGRES_PASSWORD:-distill_dev_2026}@postgres:5432/distill?schema=public
      MEDIA_SERVICE_URL: http://media-processor:8001
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-distill_dev_secret_2026}
      GITHUB_ID: ${GITHUB_ID:-}
      GITHUB_SECRET: ${GITHUB_SECRET:-}
      NODE_ENV: production
    volumes:
      - web_uploads:/app/apps/web/uploads
    depends_on:
      postgres:
        condition: service_healthy
      media-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

# ============================================================================
# 数据卷
# ============================================================================
volumes:
  postgres_data:
    driver: local
  media_tmp:
    driver: local
  media_uploads:
    driver: local
  web_uploads:
    driver: local
